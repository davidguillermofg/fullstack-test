spring.application.name=gapsi-ecommerce-api

spring.datasource.url=jdbc:h2:mem:gapsi;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Log — fecha/hora ISO-8601 (offset local), nivel, logger, mensaje
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{36} - %msg%n

# Salud del proceso (útil para comprobar que en :8080 corre Spring y no otro servicio)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Textos expuestos por REST (requisito: bienvenida y versión desde backend)
app.welcome-message=Bienvenido Candidato 01
app.version=0.0.1

# CORS — orígenes del front (Vite / producción). Ajustar en cada entorno.
app.cors.path-pattern=/api/**
app.cors.allowed-origins[0]=http://localhost:5173
app.cors.allowed-origins[1]=http://127.0.0.1:5173
